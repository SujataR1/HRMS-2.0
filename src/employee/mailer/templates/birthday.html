<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; background-color: #f9f9f9; color: #333; padding: 20px; }
    .container { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); }
    h2 { color: #4CAF50; }
    p { margin: 10px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Happy Birthday, {{ name }}!</h2>
    <p>The HRMS team wishes you a wonderful birthday filled with happiness, health, and success.</p>
    <p>Thank you for being part of the organization. We hope you have a fantastic day.</p>
    <p>Regards,<br />HRMS System</p>
  </div>
</body>
</html>
