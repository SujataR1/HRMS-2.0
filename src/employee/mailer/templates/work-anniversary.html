<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Work Anniversary</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; background-color: #f9f9f9; color: #333; padding: 20px; }
    .container { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); }
    h2 { color: #4CAF50; }
    p { margin: 10px 0; }
    .info strong { display: inline-block; width: 160px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Happy Work Anniversary, {{ name }}!</h2>
    <p>Congratulations on completing {{ yearsCompleted }} {{ yearLabel }} with the organization.</p>
    <div class="info"><strong>Joining Date:</strong> {{ eventDate }}</div>
    <p>Thank you for your commitment and contributions. We are glad to have you with us.</p>
    <p>Regards,<br />HRMS System</p>
  </div>
</body>
</html>
